url: https://madsyair.github.io/nimix/

template:
  bootstrap: 5

reference:
- title: Package
  contents:
  - nimix-package

- title: Fitting functions
  desc: User-facing entry points for clustering and mixture-of-regression.
  contents:
  - nimixClust
  - nimixReg

- title: Engines
  desc: Inference engines selected via the `method` argument.
  contents:
  - DPMEngine
  - FixedKEngine
  - DPMEngine-class
  - FixedKEngine-class
  - EngineConfig-class

- title: Distribution registry
  desc: Register and look up component distributions by name.
  contents:
  - registerDistribution
  - getDistribution
  - listDistributions

- title: Clustering component specs
  contents:
  - NormalUvSpec
  - NormalMvSpec
  - StudentTUvSpec
  - StudentTMvSpec
  - NormalGammaUvSpec
  - NormalGammaMvSpec
  - PoissonSpec
  - BinomialSpec

- title: Regression component specs
  contents:
  - NormalRegSpec
  - StudentTRegSpec
  - NormalGammaRegSpec
  - PoissonRegSpec
  - BinomialRegSpec
  - NormalMvRegSpec
  - StudentTMvRegSpec
  - NormalGammaMvRegSpec

- title: Extension API (generics)
  desc: >
    The public S4 contract a component spec implements so a new family plugs
    into every engine without engine edits.
  contents:
  - buildModelCode
  - defaultPrior
  - validateParams
  - customizeSamplers
  - relabel
  - isRegressionSpec
  - linkInv

- title: S4 class definitions
  desc: >
    Virtual base classes, model/result containers, and the class behind each
    component spec. Most users work through the constructor functions above;
    these document the underlying S4 classes.
  contents:
  - DistributionSpec-class
  - MixtureModel-class
  - ClusterModel-class
  - RegressionMixModel-class
  - FitResult-class
  - NormalUvSpec-class
  - NormalMvSpec-class
  - StudentTUvSpec-class
  - StudentTMvSpec-class
  - NormalGammaUvSpec-class
  - NormalGammaMvSpec-class
  - PoissonSpec-class
  - BinomialSpec-class
  - NormalRegSpec-class
  - StudentTRegSpec-class
  - NormalGammaRegSpec-class
  - PoissonRegSpec-class
  - BinomialRegSpec-class
  - NormalMvRegSpec-class
  - StudentTMvRegSpec-class
  - NormalGammaMvRegSpec-class

- title: Neo-normal component specs
  desc: Skew-capable MSNBurr families (Iriawan 2000; Choir 2020).
  contents:
  - MSNBurrUvSpec
  - MSNBurr2aUvSpec
  - MSNBurrUvSpec-class
  - MSNBurr2aUvSpec-class

- title: Neo-normal distribution functions
  desc: Numerically stable density, distribution, quantile, and RNG.
  contents:
  - msnburr-distribution
  - msnburr2a-distribution

- title: Spatial mixtures (MRF)
  desc: >
    Spatially constrained mixtures whose labels follow a Potts / Markov
    random field over a neighbourhood graph.
  contents:
  - spatialWeights
  - gridAdjacency
  - nRegions
  - getAdjacency
  - neighborsOf
  - MRFEngine
  - SpatialWeightSpec
  - SpatialWeightSpec-class
  - MRFEngine-class

- title: Model containers
  contents:
  - ClusterModel
  - RegressionMixModel

- title: Bayesian workflow
  desc: Posterior predictive checks; convergence diagnostics print via summary().
  contents:
  - ppCheck

- title: Extension API (engine-facing generics)
  desc: >
    The remaining S4 contract a component spec implements so a new family
    plugs into every engine.
  contents:
  - runEngine
  - componentDensity
  - simulateParams
  - componentInits
  - buildConstants
  - buildDataList
  - extractParamTraces
  - relabelComponents

- title: Utilities
  contents:
  - nimixClearCache

- title: Datasets
  contents:
  - usStates2023
  - usStateAdj
  - wdi2022

- title: Cluster profiling
  contents:
  - clusterProfile

- title: Model selection and ensembling
  desc: Predictive comparison (WAIC / PSIS-LOO) and weighted ensembles.
  contents:
  - nimixWAIC
  - nimixLOO
  - modelSelect
  - ensembleFit
  - predict-nimixEnsemble

articles:
- title: Get started
  navbar: ~
  contents:
  - mixClust-univariate
- title: More worked examples
  desc: Rendered on the website only (not shipped as package vignettes).
  contents:
  - articles/mixClust-multivariate
  - articles/mixReg
  - articles/normal-gamma-vs-studentt
  - articles/spatial-mixture
